<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>수박주스 · 패디터PICK 오늘의 메뉴</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFFFFF;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  .container {
    max-width: 500px;
    margin: 0 auto;
  }
  .content-image {
    width: 100%;
    display: block;
  }
  .cta-wrapper {
    padding: 0 0 40px;
  }
  .cta-button {
    display: block;
    width: 100%;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .cta-button:active {
    transform: scale(0.98);
    opacity: 0.85;
  }
  .cta-button img {
    width: 100%;
    display: block;
  }
</style>
</head>
<body>
  <div class="container">
    <img class="content-image"
         src="https://passorderstatic.s3.ap-northeast-2.amazonaws.com/notice/2026-05-19/contents/watermelon_all.png"
         alt="지금이 가장 맛있는 수박, 4가지 방식">
    <div class="cta-wrapper">
      <a class="cta-button"
         href="https://passorder.kr/watermelon_app_landing">
        <img src="https://passorderstatic.s3.ap-northeast-2.amazonaws.com/notice/2026-05-19/contents/cupbingsoo_button.png"
             alt="지금 주문하러 가기">
      </a>
    </div>
  </div>
</body>
</html>
